---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: agents
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      nodeSelector:
        type: wk-amd

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true

      initContainers:
        - name: copy-config
          image: busybox:latest
          command: ["sh", "-c", "cp /etc/openclaw-config/openclaw.json /etc/openclaw/openclaw.json"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: config
              mountPath: /etc/openclaw-config
              readOnly: true
            - name: openclaw-runtime
              mountPath: /etc/openclaw

      containers:
        - name: socat-proxy
          image: alpine/socat:latest
          command: ["socat", "TCP-LISTEN:18780,fork,reuseaddr", "TCP:127.0.0.1:18789"]
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 18780
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 18789

          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/openclaw.json
            - name: OPENCLAW_SKIP_ONBOARDING
              value: "true"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secret-openclaw
                  key: TELEGRAM_BOT_TOKEN
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: secret-openclaw
                  key: HA_TOKEN
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: secret-openclaw
                  key: GEMINI_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: secret-openclaw
                  key: GROQ_API_KEY
            - name: MISTRAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: secret-openclaw
                  key: MISTRAL_API_KEY

          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1500Mi

          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "const h=require('http'),r=h.get('http://localhost:18789/healthz',res=>process.exit(res.statusCode===200?0:1));r.on('error',()=>process.exit(1));r.setTimeout(3000,()=>{r.destroy();process.exit(1)})"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "const h=require('http'),r=h.get('http://localhost:18789/readyz',res=>process.exit(res.statusCode===200?0:1));r.on('error',()=>process.exit(1));r.setTimeout(3000,()=>{r.destroy();process.exit(1)})"
            initialDelaySeconds: 20
            periodSeconds: 10

          volumeMounts:
            - name: config
              mountPath: /etc/openclaw-config
              readOnly: true
            - name: openclaw-runtime
              mountPath: /etc/openclaw
            - name: data
              mountPath: /home/node/.openclaw
            - name: auth
              mountPath: /home/node/.config/openclaw

      volumes:
        - name: config
          configMap:
            name: openclaw-config
            items:
              - key: openclaw.json
                path: openclaw.json
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: auth
          persistentVolumeClaim:
            claimName: openclaw-auth
        - name: openclaw-runtime
          emptyDir: {}
