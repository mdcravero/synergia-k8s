---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: agents
data:
  openclaw.json: |
    {
      gateway: {
        mode: "local",
        auth: {
          mode: "token",
          token: "${OPENCLAW_AUTH_TOKEN}",
        },
      },

      channels: {
        telegram: {
          enabled: true,
          dmPolicy: "allowlist",
          allowFrom: [535462698],
        }
      },

      // MCP servers — disabled until correct npm package names are confirmed
      // mcp: {
      //   servers: {
      //     "home-assistant": {
      //       command: "npx",
      //       args: ["-y", "PACKAGE_NAME", "--url", "http://home-assistant.tools.svc.cluster.local:8123", "--token", "${HA_TOKEN}"]
      //     },
      //     "prometheus": {
      //       command: "npx",
      //       args: ["-y", "PACKAGE_NAME", "--url", "http://prometheus-server.monitoring.svc.cluster.local"]
      //     }
      //   }
      // },

      agents: {
        defaults: {
          model: "google/gemini-2.5-flash",
        }
      }
    }
