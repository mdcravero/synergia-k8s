---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-values
  namespace: security
data:
  values.yaml: |-
    global:
      env:
        - name: AUTHENTIK_RBAC__SYNCHRONIZE
          value: "true"
        - name: AUTHENTIK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: secret-authentik
              key: secret-key
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: secret-authentik
              key: postgres-password
        - name: AUTHENTIK_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: secret-authentik
              key: redis-password
        - name: AUTHENTIK_REDIS__USERNAME
          valueFrom:
            secretKeyRef:
              name: secret-authentik
              key: redis-username
        - name: AUTHENTIK_ERROR_REPORTING__SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: secret-authentik
              key: sentry-dsn
        
    authentik:
      postgresql:
        host: 10.42.20.70
        database: authentik
        sslmode: require
      redis:
        host: 10.42.20.71

    server:
      replicas: 1
      resources:
        requests:
          cpu: 400m    
          memory: 700Mi
        limits:
          cpu: 1000m  
          memory: 1Gi
      
      livenessProbe:
        initialDelaySeconds: 80 
        timeoutSeconds: 15
        failureThreshold: 6
      readinessProbe:
        initialDelaySeconds: 40
        timeoutSeconds: 15

      nodeSelector:
        kubernetes.io/arch: arm64

      service:
        type: LoadBalancer
        LoadBalancerIP: 10.42.20.72

      ingress:
        ingressClassName: traefik
        enabled: true
        hosts:
          - authentik.synergia.net.ar
        paths:
          - /
        pathType: Prefix
        
    worker:
      replicas: 1
      resources:
        requests:
          cpu: 500m
          memory: 800Mi
        limits:
          cpu: 1500m  
          memory: 1.8Gi
      
      nodeSelector:
        kubernetes.io/arch: arm64

      livenessProbe:
        initialDelaySeconds: 80
        periodSeconds: 30
        timeoutSeconds: 20
        failureThreshold: 6