---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: authelia
  namespace: security
spec:
  interval: 1m0s
  timeout: 15m
  chart:
    spec:
      chart: authelia
      version: "0.10.49"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: security
      reconcileStrategy: ChartVersion
  releaseName: authelia
  valuesFrom:
    - kind: ConfigMap
      name: authelia-values
      valuesKey: values.yaml
