---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldilocks
  namespace: monitoring
spec:
  interval: 1h
  dependsOn:
    - name: vpa
  chart:
    spec:
      chart: goldilocks
      version: "10.4.1"
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: monitoring
  values:
    dashboard:
      replicaCount: 1
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
    controller:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
