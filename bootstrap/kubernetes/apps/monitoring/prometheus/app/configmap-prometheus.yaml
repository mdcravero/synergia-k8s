apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |-
    server:
      name: server

      persistentVolume:
        enabled: true
        storageClass: "nfs-client"
        accessModes:
          - ReadWriteOnce
        size: 8Gi

      env:
        - name: TZ
          value: "America/Argentina/Cordoba"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"

      service:
        enabled: true
        annotations: {}
        type: LoadBalancer
        servicePort: 80
      
      ingress:
        enabled: true
        pathType: Prefix
        hosts:
        - prometheus.synergia.net.ar
        path: /
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"    
          traefik.ingress.kubernetes.io/router.tls.certresolver: le

    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: true
      extraArgs:
        - --collector.hwmon

      rbac:
        pspEnabled: false

      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      hostNetwork: false
      hostPort:
        enabled: false

      podSecurityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
     
    ruleFiles: {}
      # recording_rules.yml: |
      #   groups:
      #   - name: temperature
      #     rules:
      #     - alert: HighTemperature
      #       expr: node_hwmon_temp_celsius > 80
      #       for: 5m
      #       labels:
      #         severity: warning
      #       annotations:
      #         summary: "High temperature detected"
      #         description: "Node {{ $labels.instance }} temperature is {{ $value }}°C"

    serverFiles:
      prometheus.yml:
        rule_files:
          - /etc/config/recording_rules.yml
          - /etc/config/alerting_rules.yml
        scrape_configs:
          - job_name: node
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
          - job_name: kube-state-metrics
            static_configs:
              - targets: ['prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080']
          - job_name: node-exporter-hwmon
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
            params:
              collect[]: ['hwmon']

      alertmanager.yml: |
        global:
          resolve_timeout: 1m
        route:
          group_by: ['alertname', 'namespace']
          group_wait: 10s
          group_interval: 10s
          repeat_interval: 12h
          receiver: telegram
        receivers:
          - name: telegram
            telegram_configs:
              - bot_token: '$(TELEGRAM_BOT_TOKEN)'
                chat_id: '$(TELEGRAM_CHAT_ID)'
                send_resolved: true

    alertmanager:
      enabled: true
      persistentVolume:
        enabled: false
      config:
        global:
          resolve_timeout: 1m
      route:
        group_by: ['alertname']
        receiver: telegram
      envFrom:
        - secretRef:
            name: telegram-secret
