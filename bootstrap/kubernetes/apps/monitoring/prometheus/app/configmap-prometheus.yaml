apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |-
    server:
      name: server

      persistentVolume:
        enabled: true
        storageClass: "nfs-client"
        accessModes:
          - ReadWriteOnce
        size: 8Gi

      env:
        - name: TZ
          value: "America/Argentina/Cordoba"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"

      service:
        enabled: true
        annotations: {}
        type: LoadBalancer
        servicePort: 80
      
      ingress:
        enabled: true
        pathType: Prefix
        hosts:
        - prometheus.synergia.net.ar
        path: /
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"    
          traefik.ingress.kubernetes.io/router.tls.certresolver: le

    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: true
      extraArgs:
        - --collector.hwmon

      rbac:
        pspEnabled: false

      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      hostNetwork: false
      hostPort:
        enabled: false

      podSecurityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
     
    ruleFiles: {}
      # recording_rules.yml: |
      #   groups:
      #   - name: temperature
      #     rules:
      #     - alert: HighTemperature
      #       expr: node_hwmon_temp_celsius > 80
      #       for: 5m
      #       labels:
      #         severity: warning
      #       annotations:
      #         summary: "High temperature detected"
      #         description: "Node {{ $labels.instance }} temperature is {{ $value }}°C"

    serverFiles:
      prometheus.yml:
        rule_files:
          - /etc/config/recording_rules.yml
          - /etc/config/alerting_rules.yml
        scrape_configs:
          - job_name: node
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
          - job_name: kube-state-metrics
            static_configs:
              - targets: ['prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080']
          - job_name: node-exporter-hwmon
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
            params:
              collect[]: ['hwmon']

      alerting_rules.yml: |
        groups:
          - name: postgresql
            interval: 30s
            rules:
              - alert: PostgreSQLDown
                expr: up{job="kubernetes-pods", namespace="tools"} == 0
                for: 1m
                labels:
                  severity: critical
                annotations:
                  summary: "PostgreSQL is down"
                  description: "PostgreSQL cluster in namespace {{ $labels.namespace }} is down"
              - alert: PostgreSQLHighConnections
                expr: pg_stat_activity_count > 8
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "PostgreSQL high connections"
                  description: "Database {{ $labels.datname }} has high connections"
              - alert: PostgreSQLDeadlocks
                expr: rate(pg_stat_database_deadlocks[5m]) > 0
                for: 1m
                labels:
                  severity: warning
                annotations:
                  summary: "PostgreSQL deadlocks"
                  description: "Deadlocks detected in {{ $labels.datname }}"
              - alert: PostgreSQLExporterDown
                expr: up{namespace="tools"} == 0
                for: 2m
                labels:
                  severity: warning
                annotations:
                  summary: "PostgreSQL exporter is down"
                  description: "Exporter for {{ $labels.pod }} is down"

    alertmanager:
      enabled: true
      storageClass: "nfs-client"
      accessModes:
        - ReadWriteOnce
      size: 500Mi

      podSecurityContext:
        runAsUser: 1000
        runAsNonRoot: true
        runAsGroup: 1000
        fsGroup: 1000