apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-values
  namespace: monitoring
data:
  values.yaml: |-
    server:
      name: server

      persistentVolume:
        enabled: true
        storageClass: "nfs-client"
        accessModes:
          - ReadWriteOnce
        size: 8Gi

      env:
        - name: TZ
          value: "America/Argentina/Cordoba"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"

      service:
        enabled: true
        annotations: {}
        type: LoadBalancer
        servicePort: 80
      
      ingress:
        enabled: true
        pathType: Prefix
        hosts:
        - prometheus.synergia.net.ar
        path: /
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
          traefik.ingress.kubernetes.io/router.tls: "true"    
          traefik.ingress.kubernetes.io/router.tls.certresolver: le

    kube-state-metrics:
      enabled: true

    prometheus-node-exporter:
      enabled: true
      extraArgs:
        - --collector.hwmon

      rbac:
        pspEnabled: false

      containerSecurityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      hostNetwork: false
      hostPort:
        enabled: false

      podSecurityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000

    serverFiles:
      prometheus.yml:
        rule_files:
          - /etc/config/recording_rules.yml
          - /etc/config/alerting_rules.yml
        scrape_configs:
          - job_name: node
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
          - job_name: kube-state-metrics
            static_configs:
              - targets: ['prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080']
          - job_name: node-exporter-hwmon
            static_configs:
              - targets: ['prometheus-prometheus-node-exporter.monitoring.svc.cluster.local:9100']
            params:
              collect[]: ['hwmon']

      alerting_rules.yml: {}

    alertmanager:
      enabled: false
      # storageClass: "nfs-client"
      # accessModes:
      #   - ReadWriteOnce
      # size: 500Mi

      # podSecurityContext:
      #   runAsUser: 1000
      #   runAsNonRoot: true
      #   runAsGroup: 1000
      #   fsGroup: 1000
