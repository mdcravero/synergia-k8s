---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: monitoring
spec:
  chart:
    spec:
      chart: grafana
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: grafana
      version: 12.4.2
  interval: 1h
  timeout: 15m
  releaseName: grafana
  valuesFrom:
    - kind: ConfigMap
      name: grafana-values
      valuesKey: values.yaml
