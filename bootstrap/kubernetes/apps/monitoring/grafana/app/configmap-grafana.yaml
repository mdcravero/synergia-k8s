apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-values
  namespace: monitoring
data:
  values.yaml: |-
    global:
      imageRegistry: null
      imagePullSecrets: []

    serviceAccount:
      create: true
      name: grafana-sa

    replicas: 1

    deploymentStrategy:
      type: RollingUpdate

    readinessProbe:
      httpGet:
        path: /api/health
        port: 3000

    livenessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 60
      timeoutSeconds: 30
      failureThreshold: 10

    image:
      registry: docker.io
      repository: grafana/grafana
      tag: ""
      pullPolicy: IfNotPresent

    env: 
      PUID: 1000
      PGID: 1000
      TZ: "America/Argentina/Cordoba"

    persistence:
      enabled: true
      storageClassName: "nfs-client"
      accessModes:
        - ReadWriteOnce
      size: 5Gi

    initChownData:
      enabled: false

    admin:
      existingSecret: "secret-grafana"
      userKey: "admin-user"
      passwordKey: "admin-password"

    service:
      enabled: true
      type: LoadBalancer
      port: 80
      targetPort: 3000

    ingress:
      enabled: true
      pathType: Prefix
      hosts:
        - grafana.synergia.net.ar
      path: /
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"    

    tolerations: []

    affinity: {}

    nodeSelector:
      type: wk-amd

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboards:
      default:
        node-exporter-full:
          gnetId: 1860
          revision: 37
          datasource: Prometheus
        kubernetes-cluster:
          gnetId: 15661
          revision: 1
          datasource: Prometheus
        postgresql:
          gnetId: 9628
          revision: 7
          datasource: Prometheus
        loki-logs:
          gnetId: 13639
          revision: 2
          datasource: loki-home

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
        - access: proxy
          basicAuth: false
          isDefault: false
          jsonData:
            maxLines: 1000
            timeout: 60
            alerting: false
            queryType: "range"
            metrics: true
            logs: true
          name: Prometheus
          type: prometheus
          url: http://prometheus-server:80
        - access: proxy
          basicAuth: false
          isDefault: true
          jsonData:
            maxLines: 1000
            timeout: 60
            alerting: false
            queryType: "range"
            metrics: false
            logs: true
          name: loki-home
          type: loki
          url: http://loki-stack:3100