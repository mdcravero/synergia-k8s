---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: maintainerr
  name: maintainerr
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      run: maintainerr
  template:
    metadata:
      labels:
        run: maintainerr
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - env:
            - name: TZ
              value: "America/Argentina/Cordoba"
          image: maintainerr/maintainerr:3.16.0
          name: maintainerr
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 6246
              name: webui
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: maintainerr-data
