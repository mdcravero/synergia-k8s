---
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-values
  namespace: traefik
data:
  values.yaml: |-

    log:
      level: DEBUG

    accessLog:
      enabled: true
      format: json
    
    metrics:
      prometheus:
        service:
          enabled: true
          labels: {}
          annotations: {}
        serviceMonitor:
          enabled: false


    additionalArguments:
      - "--api.insecure=false"
      - "--api.dashboard=true"

    providers:
      kubernetesCRD: 
        allowExternalNameServices: true

      kubernetesIngress:
        allowExternalNameServices: true

    persistence:
      enabled: true
      storageClass: "nfs-client"
      accessModes:
        - ReadWriteOnce
      size: 128Mi

    ports:
      web:
        redirectTo:
          port: websecure

    service:
      enabled: true
      single: true
      type: LoadBalancer
      spec:
        loadBalancerIP: "10.42.20.40"

    ingressRoute:
      dashboard:
        enabled: true
        entryPoints:
          - websecure
        matchRule:  Host(`traefik-dash.synergia.net.ar`)
        host: traefik.synergia.net.ar
        pathPrefix: /dashboard
        services:
          - name: api@internal
            kind: TraefikService
        middlewares: 
          - name: "middlewares-authelia"
            namespace: traefik
