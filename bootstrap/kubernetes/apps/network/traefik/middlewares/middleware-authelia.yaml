---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: middlewares-authelia
  namespace: traefik
spec:
  forwardAuth:
    # Authelia v4.38+: /api/verify is not served; use /api/authz/forward-auth with Traefik ForwardAuth.
    address: "http://authelia.security.svc.cluster.local/api/authz/forward-auth"
    trustForwardHeader: true
    authResponseHeaders:
      - "Remote-User"
      - "Remote-Groups"
      - "Remote-Email"
      - "Remote-Name"
      - "Remote-Given-Name"
      - "Remote-Family-Name"
