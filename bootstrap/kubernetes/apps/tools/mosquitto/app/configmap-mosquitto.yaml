---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-conf
  namespace: tools
data:
  mosquitto.conf: |
    listener 1883
    allow_anonymous false
    password_file /mosquitto/config/passwd
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
    log_type error
    log_type warning
    log_type information
