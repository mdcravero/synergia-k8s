---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n
  namespace: tools
spec:
  dependsOn:
    - name: zalando-operator
      namespace: tools
  chart:
    spec:
      chart: n8n
      sourceRef:
        kind: HelmRepository
        name: n8n
        namespace: tools
      version: 1.24.10
  interval: 1h
  timeout: 15m
  releaseName: n8n
  valuesFrom:
    - kind: ConfigMap
      name: n8n-values
      valuesKey: values.yaml