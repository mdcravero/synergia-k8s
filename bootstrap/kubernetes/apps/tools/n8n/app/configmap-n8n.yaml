---
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-values
  namespace: tools
data:
  values.yaml: |
    image:
      repository: n8nio/n8n
      pullPolicy: IfNotPresent
      tag: "2.13.2"

    # Service account configuration
    serviceAccount:
      create: true
      name: "n8n-sa"

    # Pod security context
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"

    # Container security context
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      privileged: false
      runAsUser: 1000
      runAsGroup: 1000

    # Service configuration
    service:
      enabled: true
      type: LoadBalancer
      port: 5678
      name: http
      annotations: {}
      labels: {}

    # Database configuration
    db:
      type: postgresdb
      tablePrefix: ""
      postgresdb:
        poolSize: 2
        # Allow slow TLS / migrations; avoid pool timeouts during heavy startup.
        connectionTimeout: 60000
        idleConnectionTimeout: 30000
        schema: public
        ssl:
          enabled: true
          rejectUnauthorized: false

    # External PostgreSQL configuration
    externalPostgresql:
      host: postgres-cluster
      username: "n8n"
      port: 5432
      database: "n8n"
      existingSecret: "n8n-secrets"

    # n8n main node configuration
    main:
      count: 1
      editorBaseUrl: "https://n8n.synergia.net.ar"
      pdb:
        enabled: true
        minAvailable: 1
        maxUnavailable: null

      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi

      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        # Cold start (image pull, migrations) can exceed defaults; liveness must not
        # SIGTERM the container while DB work is still in flight (causes pool timeouts).
        initialDelaySeconds: 120
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 6

      readinessProbe:
        httpGet:
          path: /healthz/readiness
          port: http
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 15
        failureThreshold: 12

      forceToUseStatefulset: false

      persistence:
        enabled: false
      
    main:
      extraEnv:
        - name: N8N_BASIC_ACTIVE
          value: "true"
        - name: N8N_BASIC_AUTH_ACTIVE
          value: "true"
        - name: N8N_BASIC_AUTH_USER
          value: "admin"
        - name: N8N_BASIC_AUTH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: n8n-secrets
              key: auth-password
        - name: N8N_EDITOR_BASE_URL
          value: "https://n8n.synergia.net.ar"
        - name: N8N_PERSONALIZATION_ENABLED
          value: "false"
        - name: N8N_DIAGNOSTICS_ENABLED
          value: "false"
        - name: EXECUTIONS_DATA_SAVE_ON_ERROR
          value: "all"
        - name: EXECUTIONS_DATA_SAVE_ON_SUCCESS
          value: "all"
        - name: GENERIC_TIMEZONE
          value: "America/Buenos_Aires"
        - name: WEBHOOK_URL
          value: "https://n8n.synergia.net.ar"
        - name: DB_POSTGRESDB_SSL_ENABLED
          value: "true"
        - name: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
          value: "false"   
        

    # n8n encryption key - use existing secret
    existingEncryptionKeySecret: "n8n-secrets"

    # Timezone configuration
    timezone: "America/Buenos_Aires"
    defaultLocale: "en"

    # Graceful shutdown
    gracefulShutdownTimeout: 30

    # Ingress configuration
    ingress:
      enabled: true
      className: "alb-traefik"
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.tls.certresolver: le
      hosts:
        - host: n8n.synergia.net.ar
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - n8n.synergia.net.ar

    # Service monitor configuration
    serviceMonitor:
      enabled: false

    # Workflow history configuration
    workflowHistory:
      enabled: true
      pruneTime: 336

    # Node selector
    nodeSelector:
      kubernetes.io/arch: arm64

    # Tolerations
    tolerations: []

    # Affinity
    affinity: {}

    # Redis configuration
    redis:
      enabled: false

    # External Redis (disabled - no enabled field)
    externalRedis:
      host: ""
      port: 6379
