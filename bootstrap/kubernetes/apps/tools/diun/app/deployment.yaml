apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: tools
  name: diun
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diun
  template:
    metadata:
      labels:
        app: diun
      annotations:
        diun.enable: "true"
        diun.notify: "telegram"
        diun.watch_repo: "true"
    spec:
      serviceAccountName: diun
      containers:
        - name: diun
          image: crazymax/diun:4.31.0
          imagePullPolicy: Always
          args: ["serve"]
          env:
            - name: TZ
              value: "America/Argentina/Cordoba"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_JSON
              value: "false"
            - name: DIUN_WATCH_WORKERS
              value: "5"
            - name: DIUN_WATCH_SCHEDULE
              value: "0 */6 * * *"
            - name: DIUN_WATCH_JITTER
              value: "60s"
            - name: DIUN_PROVIDERS_KUBERNETES
              value: "true"
            - name: DIUN_NOTIF_TELEGRAM_CHATIDS
              valueFrom:
                secretKeyRef:
                  name: diun-secret 
                  key: telegram-chat-id
            - name: DIUN_NOTIF_TELEGRAM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: diun-secret 
                  key: telegram-bot-token
          volumeMounts:
            - mountPath: "/data"
              name: "data"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      restartPolicy: Always
      volumes:
        - name: "data"
          persistentVolumeClaim:
            claimName: diun-data