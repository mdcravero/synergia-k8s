---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: home-assistant
  name: home-assistant
  namespace: tools
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
      annotations: {}
    spec:
      securityContext:
        fsGroup: 1000
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-data
      containers:
        - name: home-assistant-app
          image: homeassistant/home-assistant:2026.6.3
          env:
            - name: TZ
              value: "America/Argentina/Córdoba"
            - name: PYTHONWARNINGS
              value: ignore:Unverified HTTPS request
            - name: HASS_HTTP_USE_X_FORWARDED_FOR
              value: "1"
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: secret-homeassistant-postgres
                  key: POSTGRES_URL
          volumeMounts:
            - mountPath: /config
              name: config
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 3
            timeoutSeconds: 1
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 1
            periodSeconds: 10
