---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: homeassistant-backup
  namespace: tools
spec:
  schedule: "0 9 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: homeassistant-backup
              image: rclone/rclone:1.68.2
              command:
                - sh
                - -c
                - |
                  set -e
                  echo "[$(date)] Syncing HA backups to Mega..."
                  rclone copy /config/backups/ "mega:${MEGA_PATH}/" --progress
                  echo "[$(date)] Files in Mega:"
                  rclone ls "mega:${MEGA_PATH}/"
                  echo "[$(date)] Sync complete"
              env:
                - name: MEGA_PATH
                  value: "backups/homeassistant/synergia-k8s"
                - name: RCLONE_CONFIG_MEGA_TYPE
                  value: "mega"
                - name: RCLONE_CONFIG_MEGA_USER
                  valueFrom:
                    secretKeyRef:
                      name: secret-homeassistant
                      key: mega-username
                - name: RCLONE_CONFIG_MEGA_PASS
                  valueFrom:
                    secretKeyRef:
                      name: secret-homeassistant
                      key: mega-password
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: ha-config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: ha-config
              persistentVolumeClaim:
                claimName: home-assistant-data
