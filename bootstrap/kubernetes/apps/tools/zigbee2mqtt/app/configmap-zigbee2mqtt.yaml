---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zigbee2mqtt-conf
  namespace: tools
data:
  configuration.yaml: |
    homeassistant:
      enabled: true

    permit_join: false

    mqtt:
      base_topic: zigbee2mqtt
      server: mqtt://mosquitto.tools.svc.cluster.local:1883

    serial:
      port: tcp://10.42.30.30:6638
      adapter: zstack

    advanced:
      log_level: info
      log_output:
        - console

    frontend:
      enabled: true
      port: 8080
