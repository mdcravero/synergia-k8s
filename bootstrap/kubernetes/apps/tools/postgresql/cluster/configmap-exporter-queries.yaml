apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-exporter-queries
  namespace: tools
data:
  queries.yaml: |
    pg_replication:
      query: "SELECT CASE WHEN pg_is_in_recovery() THEN 1 ELSE 0 END as is_replica, COALESCE(pg_wal_lsn_diff(pg_current_wal_lsn(), pg_last_wal_replay_lsn())::float, 0) as lag_bytes"
      master: true
      values:
        - is_replica
        - lag_bytes

    pg_database:
      query: "SELECT datname AS database_name, pg_database_size(datname)::float AS size_bytes FROM pg_database WHERE NOT datistemplate"
      values:
        - database_name
        - size_bytes

    pg_stat_database:
      query: "SELECT datname, xact_commit::float, xact_rollback::float, blks_read::float, blks_hit::float, tup_returned::float, tup_fetched::float, tup_inserted::float, tup_updated::float, tup_deleted::float, conflicts::float, temp_files::float, temp_bytes::float, deadlocks::float FROM pg_stat_database"
      values:
        - datname
        - xact_commit
        - xact_rollback
        - blks_read
        - blks_hit
        - tup_returned
        - tup_fetched
        - tup_inserted
        - tup_updated
        - tup_deleted
        - conflicts
        - temp_files
        - temp_bytes
        - deadlocks

    pg_stat_bgwriter:
      query: "SELECT buffers_clean::float, maxwritten_clean::float, buffers_alloc::float FROM pg_stat_bgwriter"
      values:
        - buffers_clean
        - maxwritten_clean
        - buffers_alloc

    pg_stat_activity:
      query: "SELECT count(*) FILTER (WHERE state = 'active') AS active, count(*) FILTER (WHERE state = 'idle') AS idle, count(*) FILTER (WHERE state = 'idle in transaction') AS idle_in_transaction, count(*) FILTER (WHERE state = 'idle in transaction (aborted)') AS idle_in_transaction_aborted, count(*) FILTER (WHERE state = 'disabled') AS disabled FROM pg_stat_activity"
      values:
        - active
        - idle
        - idle_in_transaction
        - idle_in_transaction_aborted
        - disabled

    pg_stat_user_tables:
      query: "SELECT schemaname, relname, seq_scan::float, seq_tup_read::float, idx_scan::float, idx_tup_fetch::float, n_tup_ins::float, n_tup_upd::float, n_tup_del::float, n_live_tup::float, n_dead_tup::float FROM pg_stat_user_tables"
      values:
        - schemaname
        - relname
        - seq_scan
        - seq_tup_read
        - idx_scan
        - idx_tup_fetch
        - n_tup_ins
        - n_tup_upd
        - n_tup_del
        - n_live_tup
        - n_dead_tup

    pg_stat_user_indexes:
      query: "SELECT schemaname, relname, indexrelname, idx_scan::float, idx_tup_read::float, idx_tup_fetch::float FROM pg_stat_user_indexes"
      values:
        - schemaname
        - relname
        - indexrelname
        - idx_scan
        - idx_tup_read
        - idx_tup_fetch

    pg_postmaster:
      query: "SELECT pg_postmaster_start_time() AS start_time, current_setting('server_version_num')::int AS version"
      values:
        - start_time
        - version

    pg_stat_replication:
      query: "SELECT usename, application_name, client_addr, state, COALESCE(pg_wal_lsn_diff(pg_current_wal_lsn(), replay_lsn), 0)::float AS lag_bytes FROM pg_stat_replication"
      values:
        - usename
        - application_name
        - client_addr
        - state
        - lag_bytes