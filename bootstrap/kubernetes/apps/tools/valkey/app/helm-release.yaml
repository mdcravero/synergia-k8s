---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
  namespace: tools
spec:
  chart:
    spec:
      chart: valkey
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: valkey
      version: 6.1.14
  interval: 1h
  releaseName: valkey
  valuesFrom:
    - kind: ConfigMap
      name: valkey-values
      valuesKey: values.yaml
