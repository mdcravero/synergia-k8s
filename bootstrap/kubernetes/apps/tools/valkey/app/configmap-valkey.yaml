---
apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-values
  namespace: tools
data:
  values.yaml: |-
    clusterDomain: synergia.local
    useHostnames: true
    nameResolutionThreshold: 5
    nameResolutionTimeout: 5

    image:
      registry: docker.io
      repository: bitnami/valkey
      pullPolicy: IfNotPresent

    auth:
      enabled: true
      sentinel: true
      existingSecret: "redis-secret"
      existingSecretPasswordKey: "password"
      usePasswordFileFromSecret: true

    primary:
      count: 1
      revisionHistoryLimit: 10
      disableCommands:
        - FLUSHDB
        - FLUSHALL

      containerPorts:
        valkey: 6379

      livenessProbe:
        enabled: true
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 5

      readinessProbe:
        enabled: true
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 1
        successThreshold: 1
        failureThreshold: 5

      podSecurityContext:
        enabled: true
        fsGroupChangePolicy: Always
        sysctls: []
        supplementalGroups: []
        fsGroup: 999

      containerSecurityContext:
        enabled: true
        seLinuxOptions: {}
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop: ["ALL"]

      kind: StatefulSet

      persistence:
        enabled: true
        path: /data
        storageClass: "nfs-client"
        accessModes:
          - ReadWriteOnce
        size: 8Gi

      service:
        type: ClusterIP
        ports:
          valkey: 6379

      serviceAccount:
        create: true

      pdb:
        create: true
        minAvailable: ""
        maxUnavailable: ""

      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    replica:
      replicaCount: 0

    sentinel:
      enabled: false
