---
# Prerequisite: create the Secret with the talosconfig before enabling this CronJob.
#
#   kubectl create secret generic talosconfig \
#     --from-file=config=/path/to/synergia-k8s-talos/talosconfig \
#     -n backup-system
#
# Or via External Secrets (recommended for GitOps).
# The Secret must have a "config" key with the talosconfig content.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: backup-system
  labels:
    app.kubernetes.io/name: etcd-backup
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: synergia-k8s
spec:
  schedule: "0 3 * * *"          # Daily at 3 AM UTC
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  concurrencyPolicy: Forbid       # Prevent overlap if job takes longer than 24h
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: etcd-backup
            image: rclone/rclone:1.68.2
            command:
            - sh
            - -c
            - |
              set -e
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              SNAPSHOT_FILE="/tmp/etcd-${TIMESTAMP}.db"

              ARCH=$(uname -m)
              case "${ARCH}" in
                x86_64)  TALOS_ARCH="amd64" ;;
                aarch64) TALOS_ARCH="arm64" ;;
                *) echo "Unsupported architecture: ${ARCH}"; exit 1 ;;
              esac

              echo "[$(date)] Downloading talosctl ${TALOS_VERSION} (${TALOS_ARCH})..."
              wget -q -O /tmp/talosctl \
                "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-${TALOS_ARCH}"
              chmod +x /tmp/talosctl

              echo "[$(date)] Taking etcd snapshot..."
              /tmp/talosctl etcd snapshot "${SNAPSHOT_FILE}" \
                --talosconfig /talosconfig/config \
                -e "${TALOS_ENDPOINT}" \
                -n "${TALOS_NODE}"

              echo "[$(date)] Snapshot size: $(du -sh ${SNAPSHOT_FILE} | cut -f1)"

              echo "[$(date)] Uploading to Mega.nz at ${MEGA_PATH}..."
              rclone copy "${SNAPSHOT_FILE}" "mega:${MEGA_PATH}/" --progress

              echo "[$(date)] Rotating old snapshots (keeping last ${RETENTION_COUNT})..."
              rclone ls "mega:${MEGA_PATH}/" \
                | sort -k2 \
                | head -n "-${RETENTION_COUNT}" \
                | awk '{print $2}' \
                | while read f; do
                    echo "Deleting old snapshot: $f"
                    rclone deletefile "mega:${MEGA_PATH}/${f}"
                  done

              rm -f "${SNAPSHOT_FILE}"
              echo "[$(date)] Backup complete: etcd-${TIMESTAMP}.db"
            env:
            - name: TALOS_VERSION
              value: "v1.11.6"
            - name: TALOS_ENDPOINT
              value: "10.42.20.4"          # Cluster VIP
            - name: TALOS_NODE
              value: "10.42.20.5"          # Node used to take the snapshot
            - name: MEGA_PATH
              value: "backups/etcd/synergia-k8s"
            - name: RETENTION_COUNT
              value: "7"                   # Snapshots to retain
            - name: RCLONE_CONFIG_MEGA_TYPE
              value: "mega"
            - name: RCLONE_CONFIG_MEGA_USER
              valueFrom:
                secretKeyRef:
                  name: secret-mega
                  key: mega-username
            - name: RCLONE_CONFIG_MEGA_PASS
              valueFrom:
                secretKeyRef:
                  name: secret-mega
                  key: mega-password
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            volumeMounts:
            - name: talosconfig
              mountPath: /talosconfig
              readOnly: true
          volumes:
          - name: talosconfig
            secret:
              secretName: talosconfig
