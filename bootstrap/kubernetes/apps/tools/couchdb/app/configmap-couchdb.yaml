---
apiVersion: v1
kind: ConfigMap
metadata:
  name: couchdb-values
  namespace: tools
data:
  values.yaml: |
    # Single-node cluster suitable for Obsidian Self-hosted LiveSync
    clusterSize: 1

    # Disable auto-creation — secret couchdb-couchdb is managed via SOPS
    createAdminSecret: false

    # CouchDB configuration for Obsidian LiveSync CORS requirements
    couchdbConfig:
      couchdb:
        uuid: "c31d19dd02594378b84ddcf1b045b820"
      httpd:
        enable_cors: "true"
        bind_address: "0.0.0.0"
        WWW-Authenticate: 'Basic realm="administrator"'
      cors:
        origins: "*"
        credentials: "true"
        methods: "GET, PUT, POST, HEAD, DELETE"
        headers: "accept, authorization, content-type, origin, referer"
      chttpd:
        require_valid_user: "true"
        max_http_request_size: "4294967296"
      chttpd_auth:
        require_valid_user: "true"
        authentication_redirect: "/_utils/session.html"

    # Service
    service:
      type: ClusterIP
      externalPort: 5984

    # Ingress with Traefik
    ingress:
      enabled: true
      className: "traefik"
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - couchdb.synergia.net.ar
      path: /
      tls:
        - hosts:
            - couchdb.synergia.net.ar

    # Persistence
    persistentVolume:
      enabled: true
      storageClass: "nfs-client"
      accessModes:
        - ReadWriteOnce
      size: "10Gi"

    # Resources
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Run as couchdb user directly — skips the root chown step that NFS root_squash rejects
    containerSecurityContext:
      runAsUser: 5984
      runAsGroup: 5984
      runAsNonRoot: true

    # ARM64 node selection
    nodeSelector:
      kubernetes.io/arch: arm64

    tolerations: []
    affinity: {}

    # Liveness / readiness
    livenessProbe:
      enabled: true
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3

    readinessProbe:
      enabled: true
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 6
