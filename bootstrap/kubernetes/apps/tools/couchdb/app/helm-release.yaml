---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: couchdb
  namespace: tools
spec:
  chart:
    spec:
      chart: couchdb
      sourceRef:
        kind: HelmRepository
        name: couchdb
        namespace: tools
      version: 4.6.3
  interval: 1h
  releaseName: couchdb
  valuesFrom:
    - kind: ConfigMap
      name: couchdb-values
      valuesKey: values.yaml
