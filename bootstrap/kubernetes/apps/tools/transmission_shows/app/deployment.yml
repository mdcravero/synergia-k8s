apiVersion: apps/v1
kind: Deployment
metadata:
  name: trans-shows
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trans-shows
  template:
    metadata:
      labels:
        app: trans-shows
    spec:
      containers:
         - name: trans-shows
          image: "lscr.io/linuxserver/transmission:4.1.1"
          ports:
            - containerPort: 9091
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Argentina/Cordoba"
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: secret-transmission-movies
                  key: username
            - name: PASS
              valueFrom:
                secretKeyRef:
                  name: secret-transmission-movies
                  key: password
            # Blocklist with URL
            - name: TRANSMISSION_BLOCKLIST_ENABLED
              value: "true"
            - name: TRANSMISSION_BLOCKLIST_URL
              value: "https://github.com/Naunter/BT_BlockLists/raw/master/bt_blocklists.gz"
            - name: TRANSMISSION_BLOCKLIST_DAYS
              value: "7"  # Auto-update weekly
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
       volumes:
          - name: config
            persistentVolumeClaim:
              claimName: trans-shows-config
          - name: downloads
            persistentVolumeClaim:
              claimName: trans-shows-down
